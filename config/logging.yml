# ─── Logging Configuration ───────────────────────────────────────────────────
# Used by loguru and standard logging throughout the platform.

version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  json:
    (): loguru._logger.Logger
    format: "%(message)s"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: WARNING
    formatter: standard
    filename: /tmp/customer360.log
    maxBytes: 10485760  # 10 MB
    backupCount: 5
    encoding: utf-8

root:
  level: INFO
  handlers: [console, file]

loggers:
  customer360.producer:
    level: INFO
    handlers: [console]
    propagate: false

  customer360.consumer:
    level: INFO
    handlers: [console]
    propagate: false

  customer360.spark:
    level: WARNING
    handlers: [console, file]
    propagate: false

  customer360.ml:
    level: INFO
    handlers: [console, file]
    propagate: false
