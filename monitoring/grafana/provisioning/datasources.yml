apiVersion: 1

datasources:
  # ─── Prometheus ───────────────────────────────────────────────────────
  - name: Prometheus
    type: prometheus
    access: proxy
    uid: prometheus-uid
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST
      timeInterval: "15s"

  # ─── PostgreSQL Warehouse ─────────────────────────────────────────────
  - name: PostgreSQL
    type: postgres
    access: proxy
    uid: postgres-uid
    url: postgres:5432
    database: customer360_warehouse
    user: customer360
    editable: true
    secureJsonData:
      password: customer360secret
    jsonData:
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 14400
      postgresVersion: 1500
      timescaledb: false
