apiVersion: 1

providers:
  - name: Customer360 Dashboards
    orgId: 1
    folder: Customer360
    folderUid: customer360-folder
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
