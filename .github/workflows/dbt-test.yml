name: dbt Tests

on:
  push:
    paths:
      - 'dbt/**'
      - '.github/workflows/dbt-test.yml'
  pull_request:
    paths:
      - 'dbt/**'

jobs:
  dbt-compile:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: customer360
          POSTGRES_PASSWORD: customer360secret
          POSTGRES_DB: customer360_warehouse
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dbt
        run: |
          pip install dbt-core dbt-postgres

      - name: dbt parse & compile
        run: |
          cd dbt
          dbt deps
          dbt parse
          dbt compile
