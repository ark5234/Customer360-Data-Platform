name: dbt Tests

on:
  push:
    paths:
      - 'dbt/**'
      - '.github/workflows/dbt-test.yml'
  pull_request:
    paths:
      - 'dbt/**'

jobs:
  dbt-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dbt
        run: |
          pip install dbt-core dbt-postgres

      - name: dbt parse & compile
        run: |
          cd dbt
          dbt deps
          dbt parse
          dbt compile
