name: Docker Build Check

on:
  push:
    paths:
      - 'docker/**'
      - 'docker-compose.yml'
      - 'requirements.txt'
  pull_request:
    paths:
      - 'docker/**'
      - 'docker-compose.yml'
      - 'requirements.txt'

jobs:
  build-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check docker-compose config
        run: docker-compose config > /dev/null

      # In a real environment we might build custom images here
      # For now, we just validate the compose file structure
